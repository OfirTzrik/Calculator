<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
        <script type="module" src="script.js"></script>
        <title>Calculator</title>
    </head>
    <body>
        <header>
            <div id="header-div" class="header-footer">
                <h1 id="title">Calculator</h1>
            </div>
        </header>
        <main>
            <div id="calc-body">
                <div id="top">
                    <div id="screen">
                        <p></p>
                    </div>
                    <div id="reset">
                        <p>AC</p>
                    </div>
                </div>
                <div id="buttons">
                    <ul id="buttons-list">
                        <li class="btn">7</li>
                        <li class="btn">8</li>
                        <li class="btn">9</li>
                        <li class="btn">÷</li>
                        <li class="btn">4</li>
                        <li class="btn">5</li>
                        <li class="btn">6</li>
                        <li class="btn">x</li>
                        <li class="btn">1</li>
                        <li class="btn">2</li>
                        <li class="btn">3</li>
                        <li class="btn">-</li>
                        <li class="btn">0</li>
                        <li class="btn">.</li>
                        <li class="btn">=</li>
                        <li class="btn">+</li>
                    </ul>
                </div>
            </div>
        </main>
        <footer>
            <div id="footer-div" class="header-footer">
                <p>Created by OfirTzrik for "The Odin Project", Foundations, "Project: Calculator"</p>
            </div>
        </footer>
    </body>
</html>
